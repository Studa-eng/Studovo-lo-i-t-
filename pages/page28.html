    <h2>Kolik CO2 emituje lodní a letecká doprava?</h2>
    <div class="page28">
        Lodní doprava ročně produkuje přibližně 1 miliardu tun CO2, což je asi 2-3 % globálních emisí.
        <p>​Letecká doprava je odpovědná za přibližně 2-3 % globálních emisí CO2.​</p>
